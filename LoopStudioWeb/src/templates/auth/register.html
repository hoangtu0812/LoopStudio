{% extends "base.html" %}
{% block title %}Đăng ký - Loop Studio{% endblock %}

{% block content %}
<div class="flex min-h-[80vh] flex-1 flex-col justify-center px-4 py-12 lg:px-8 animate-[fadeIn_0.5s_ease-out]">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
        <h2 class="mt-8 text-center text-3xl font-extrabold tracking-tight">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300">
                Đăng ký tài khoản
            </span>
        </h2>
        <p class="mt-2 text-center text-sm text-gray-500 dark:text-gray-400 font-medium">
            Điền thông tin tài khoản của bạn để tham gia Loop Studio
        </p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md relative">
        <div class="absolute -top-12 -left-12 w-32 h-32 bg-brand-500/10 dark:bg-brand-500/20 rounded-full blur-2xl pointer-events-none"></div>
        <div class="absolute -bottom-12 -right-12 w-32 h-32 bg-blue-500/10 dark:bg-blue-500/20 rounded-full blur-2xl pointer-events-none"></div>
        
        <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl px-6 py-10 shadow-[0_4px_24px_rgba(0,0,0,0.04)] dark:shadow-[0_4px_24px_rgba(0,0,0,0.2)] border border-gray-200/50 dark:border-gray-700/50 sm:rounded-3xl sm:px-12 relative z-10 overflow-hidden">
            <form class="space-y-6" method="POST">
                
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <div>
                    <label for="username" class="block text-sm font-semibold leading-6 text-gray-900 dark:text-gray-200 mb-2">Tên đăng nhập</label>
                    <div class="mt-2 text-gray-500 relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <input id="username" name="username" type="text" required 
                               class="block w-full rounded-xl border-0 py-3 pl-11 pr-4 text-gray-900 bg-white shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-500 dark:bg-gray-900/50 dark:text-white dark:ring-gray-700 dark:focus:ring-brand-500 sm:text-sm sm:leading-6 transition-all">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-semibold leading-6 text-gray-900 dark:text-gray-200">Mật khẩu</label>
                    </div>
                    <div class="mt-2 text-gray-500 relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                            </svg>
                        </div>
                        <input id="password" name="password" type="password" required 
                               class="block w-full rounded-xl border-0 py-3 pl-11 pr-4 text-gray-900 bg-white shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-500 dark:bg-gray-900/50 dark:text-white dark:ring-gray-700 dark:focus:ring-brand-500 sm:text-sm sm:leading-6 transition-all">
                    </div>
                </div>

                <div>
                    <label for="telegram_user_id" class="block text-sm font-semibold leading-6 text-gray-900 dark:text-gray-200 mb-2">
                        Telegram User ID (tuỳ chọn)
                    </label>
                    <div class="mt-2 text-gray-500 relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-5 w-5 text-gray-400" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                            </svg>
                        </div>
                        <input id="telegram_user_id" name="telegram_user_id" type="text" placeholder="Ví dụ: 123456789"
                               class="block w-full rounded-xl border-0 py-3 pl-11 pr-4 text-gray-900 bg-white shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-500 dark:bg-gray-900/50 dark:text-white dark:ring-gray-700 dark:focus:ring-brand-500 sm:text-sm sm:leading-6 transition-all">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="flex w-full justify-center rounded-xl bg-gradient-to-r from-brand-500 to-brand-600 dark:from-brand-600 dark:to-brand-700 px-4 py-3 text-sm font-semibold text-white shadow-md shadow-brand-500/20 hover:shadow-lg hover:from-brand-400 hover:to-brand-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-500 transition-all duration-200 transform hover:-translate-y-0.5">
                        Tạo tài khoản
                    </button>
                </div>
            </form>
        </div>

        <p class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400 font-medium">
            Đã có tài khoản?
            <a href="{{ url_for('auth.login') }}" class="font-semibold text-brand-600 hover:text-brand-700 dark:text-brand-400 dark:hover:text-brand-300 transition-colors ml-1">Đăng nhập ngay</a>
        </p>
    </div>
</div>
{% endblock %}
