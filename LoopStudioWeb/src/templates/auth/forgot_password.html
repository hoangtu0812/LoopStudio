{% extends "base.html" %}
{% block title %}Quên mật khẩu - Loop Studio{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex flex-col justify-center animate-[fadeIn_0.5s_ease-out] py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center mb-8">
        <h2 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white">Quên mật khẩu</h2>
        <p class="mt-2 text-sm text-gray-500 dark:text-gray-400 max-w-sm mx-auto">
            Nhập tên đăng nhập. Hệ thống sẽ gửi OTP reset mật khẩu qua Telegram nếu tài khoản đã cấu hình Telegram ID.
        </p>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] dark:shadow-[0_4px_24px_rgba(0,0,0,0.2)] border border-gray-200/50 dark:border-gray-700/50 sm:rounded-2xl p-8 relative overflow-hidden">
            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-900 dark:text-white">Tên đăng nhập</label>
                    <input type="text" name="username" id="username" required
                           class="mt-2 block w-full rounded-xl border-0 py-2.5 px-3 bg-gray-50 dark:bg-gray-900/50 text-gray-900 dark:text-white ring-1 ring-inset ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-brand-500 sm:text-sm">
                </div>
                <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-brand-500 to-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-md hover:from-brand-400 hover:to-brand-500">
                    Gửi OTP reset
                </button>
            </form>
            <div class="mt-6 text-center text-sm">
                <a href="{{ url_for('auth.login') }}" class="font-medium text-brand-600 dark:text-brand-400 hover:text-brand-500 dark:hover:text-brand-300">
                    Quay về đăng nhập
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
