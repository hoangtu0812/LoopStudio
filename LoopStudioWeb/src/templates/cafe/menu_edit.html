{% extends "base.html" %}
{% block title %}Sửa món - Cafe POS{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
    <div>
        <a href="{{ url_for('cafe_admin.menu') }}" class="text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300">← Quay lại cấu hình món</a>
        <h1 class="text-3xl font-extrabold tracking-tight mt-2">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300">
                Sửa món: {{ item.name }}
            </span>
        </h1>
    </div>

    <section class="bg-white/80 dark:bg-gray-800/80 rounded-2xl border border-gray-200/50 dark:border-gray-700/50 p-6">
        <form method="post" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div>
                <label class="block text-sm font-semibold text-gray-900 dark:text-white mb-1">Tên món</label>
                <input name="name" value="{{ item.name }}" required class="block w-full rounded-xl border-0 py-2.5 px-3 bg-white dark:bg-gray-900/50 text-sm ring-1 ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-brand-500"/>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-900 dark:text-white mb-1">Danh mục</label>
                    <input name="category" value="{{ item.category or '' }}" class="block w-full rounded-xl border-0 py-2.5 px-3 bg-white dark:bg-gray-900/50 text-sm ring-1 ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-brand-500"/>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-900 dark:text-white mb-1">Giá (VND)</label>
                    <input name="price" type="number" min="0" step="1000" value="{{ item.price or 0 }}" class="block w-full rounded-xl border-0 py-2.5 px-3 bg-white dark:bg-gray-900/50 text-sm ring-1 ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-brand-500"/>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-900 dark:text-white mb-1">URL ảnh</label>
                <input name="image_url" value="{{ item.image_url or '' }}" class="block w-full rounded-xl border-0 py-2.5 px-3 bg-white dark:bg-gray-900/50 text-sm ring-1 ring-gray-300 dark:ring-gray-700 focus:ring-2 focus:ring-brand-500"/>
            </div>
            <label class="inline-flex items-center gap-2 text-sm text-gray-700 dark:text-gray-300">
                <input type="checkbox" name="is_active" {{ 'checked' if item.is_active else '' }} class="h-4 w-4 rounded border-gray-300"/>
                Đang bán
            </label>
            <div class="flex justify-end gap-2">
                <a href="{{ url_for('cafe_admin.menu') }}" class="px-4 py-2 rounded-xl text-sm font-semibold text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 dark:text-gray-200 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">Hủy</a>
                <button type="submit" class="px-4 py-2 rounded-xl text-sm font-semibold text-white bg-brand-600 hover:bg-brand-500">Lưu thay đổi</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
