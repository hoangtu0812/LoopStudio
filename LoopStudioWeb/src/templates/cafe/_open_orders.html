<div class="mt-3 space-y-2">
    {% for order in open_orders %}
    <div class="rounded-xl border px-3 py-2 transition {{ 'border-brand-500 bg-brand-50/60 dark:bg-brand-900/20' if selected_order and selected_order.id == order.id else 'border-gray-200 dark:border-gray-700 hover:border-brand-400/60' }}">
        <a href="{{ url_for('cafe_order.index', order_id=order.id) }}" class="block">
            <p class="text-sm font-semibold text-gray-900 dark:text-white">{{ order.table_name }}</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">Mã #{{ order.id }} · {{ '{:,.0f}'.format(order.subtotal or 0) }} đ</p>
        </a>
        <form method="post" action="{{ url_for('cafe_order.close_table', order_id=order.id) }}" class="mt-2" onsubmit="return confirm('Đóng bàn này? Bàn mở nhầm sẽ không ghi nhận doanh thu.');">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <button type="submit" class="w-full text-xs px-2 py-1.5 rounded bg-rose-600 text-white hover:bg-rose-500">Đóng bàn</button>
        </form>
    </div>
    {% else %}
    <p class="text-sm text-gray-500 dark:text-gray-400 italic">Chưa có bàn nào đang mở.</p>
    {% endfor %}
</div>
