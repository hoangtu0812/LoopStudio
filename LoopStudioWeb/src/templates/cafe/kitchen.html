{% extends "base.html" %}
{% block title %}Trang bếp - Cafe POS{% endblock %}

{% block content %}
<div class="space-y-6 lg:space-y-8">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300">
                    Trang bếp (realtime)
                </span>
            </h1>
            <p class="text-sm md:text-base text-gray-500 dark:text-gray-400 font-medium mt-1">
                Danh sách món theo trạng thái: đang chờ, đang làm, xong, đã lên.
            </p>
        </div>
        <div class="flex gap-2 flex-wrap">
            <a href="{{ url_for('cafe_order.index') }}" class="inline-flex items-center px-3 py-2 text-xs font-semibold rounded-lg text-white bg-brand-600 hover:bg-brand-500">Trang order</a>
            <a href="{{ url_for('cafe_admin.dashboard') }}" class="inline-flex items-center px-3 py-2 text-xs font-semibold rounded-lg text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 dark:text-gray-200 dark:bg-gray-800 dark:border-gray-700 dark:hover:bg-gray-700">Báo cáo</a>
        </div>
    </div>

    <div id="kitchen-panel">
        {% include "cafe/_kitchen_panel.html" %}
    </div>
</div>

<script>
(() => {
    const panel = document.getElementById("kitchen-panel");
    if (!panel) return;
    const reloadPanel = async () => {
        try {
            const res = await fetch("{{ url_for('cafe_kitchen.panel') }}", { credentials: "same-origin" });
            if (!res.ok) return;
            panel.innerHTML = await res.text();
        } catch (_e) {
            // keep last successful state
        }
    };
    setInterval(reloadPanel, 2500);
})();
</script>
{% endblock %}
