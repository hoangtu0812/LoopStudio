{% extends "base.html" %}
{% block title %}Gửi thông báo Telegram - Loop Studio{% endblock %}

{% block content %}
<div class="px-4 sm:px-6 lg:px-8 max-w-3xl mx-auto py-8 animate-[fadeIn_0.5s_ease-out]">
    
    <div class="mb-8 items-center justify-between">
        <a href="{{ url_for('bot_admin.index') }}" class="inline-flex items-center text-sm font-medium text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 transition-colors mb-4">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Quay lại lịch sử
        </a>
        <h1 class="text-3xl font-extrabold tracking-tight">
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300">
                Gửi lệnh Custom Message
            </span>
        </h1>
        <p class="mt-2 text-base text-gray-500 dark:text-gray-400 font-medium max-w-2xl">
            Gửi tin nhắn thủ công thông qua Bot đến một Chat ID cụ thể.
        </p>
    </div>

    <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] dark:shadow-[0_4px_24px_rgba(0,0,0,0.2)] border border-gray-200/50 dark:border-gray-700/50 sm:rounded-3xl overflow-hidden relative">
        <form method="post" class="p-6 sm:p-10 relative z-10">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div class="space-y-8">
                <!-- Chat ID -->
                <div>
                    <label for="chat_id" class="block text-sm font-semibold leading-6 text-gray-900 dark:text-gray-200">Chat ID đích</label>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-2 mt-1">Lấy từ lịch sử truy cập hoặc từ Bot @userinfobot.</p>
                    <div class="mt-2 text-gray-500 relative rounded-md shadow-sm">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input type="text" name="chat_id" id="chat_id" placeholder="-1001234567890 hoặc 123456789" required
                               class="block w-full rounded-xl border-0 py-3 pl-12 pr-4 text-gray-900 bg-white shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-500 dark:bg-gray-900/50 dark:text-white dark:ring-gray-700 dark:focus:ring-brand-500 sm:text-sm sm:leading-6 transition-all">
                    </div>
                </div>

                <!-- Message -->
                <div class="pt-6 border-t border-gray-100 dark:border-gray-700/50">
                    <label for="message" class="block text-sm font-semibold leading-6 text-gray-900 dark:text-gray-200 mb-2">Nội dung tin nhắn</label>
                    <div class="mt-2 text-gray-500 relative rounded-md shadow-sm">
                        <textarea name="message" id="message" rows="5" required placeholder="Nhập tin nhắn..."
                                  class="block w-full rounded-xl border-0 py-3 px-4 text-gray-900 bg-white shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-500 dark:bg-gray-900/50 dark:text-white dark:ring-gray-700 dark:focus:ring-brand-500 sm:text-sm sm:leading-6 transition-all"></textarea>
                    </div>
                </div>
            </div>

            <!-- Action -->
            <div class="mt-10 flex items-center justify-end gap-x-4 pt-6 border-t border-gray-100 dark:border-gray-700/50">
                <a href="{{ url_for('bot_admin.index') }}" class="text-sm font-semibold leading-6 text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition-colors">
                    Hủy
                </a>
                <button type="submit" class="inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-brand-500 to-brand-600 dark:from-brand-600 dark:to-brand-700 px-6 py-2.5 text-sm font-semibold text-white shadow-md shadow-brand-500/20 hover:shadow-lg hover:from-brand-400 hover:to-brand-500 dark:hover:from-brand-500 dark:hover:to-brand-600 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-500 transition-all duration-200 transform hover:-translate-y-0.5">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Gửi tin nhắn
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
